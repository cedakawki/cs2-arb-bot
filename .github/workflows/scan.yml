name: CS2 Arbitraj Tarayıcı

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cs2-arb-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları kur
        run: npm install

      - name: Taramayı çalıştır
        env:
          CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_MARKUP_PCT: '-20'
          MAX_MARKUP_PCT: '-10'
          MIN_STEAM_PRICE: '0.5'
          MIN_VOLUME: '20'
          MAX_ITEMS_PER_RUN: '35'
        run: node index.js

      - name: state.json'ı repoya geri kaydet
        run: |
          git config user.name "cs2-arb-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "state güncellendi [skip ci]"
          git pull --rebase --autostash
          git push
